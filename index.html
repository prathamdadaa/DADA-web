<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DADA | Welcome</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            overflow: hidden; /* Prevents scrolling during loading */
        }

        /* --- LOADING SCREEN STYLES --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out, visibility 0.8s;
        }

        .loader-logo {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 0.5rem;
            color: #ffffff;
            text-transform: uppercase;
            opacity: 0;
            transform: scale(0.95);
            /* Combined animation: Fade/Scale up, then expand letter spacing */
            animation: introEffect 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Dramatic text animation */
        @keyframes introEffect {
            0% {
                opacity: 0;
                transform: scale(0.95);
                letter-spacing: -0.5rem;
                filter: blur(10px);
            }
            40% {
                opacity: 1;
                filter: blur(0px);
                transform: scale(1);
            }
            100% {
                opacity: 1;
                letter-spacing: 1.5rem; /* Expands the text elegantly */
                transform: scale(1);
            }
        }

        /* Class added via JS to dismiss the loader */
        #loader.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- MAIN CONTENT STYLES --- */
        #main-content {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out 0.4s, transform 1s ease-out 0.4s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        /* Class added via JS to reveal main content */
        #main-content.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 300;
        }

        p {
            color: #a0a0a0;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="loader-logo">DADA</div>
    </div>

    <!-- Main Website Content -->
    <div id="main-content">
        <h1>hello my name is pratham dada</h1>
        <p>bca doing web project .</p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('main-content');

            // Force the loading screen to display for at least 3 seconds 
            // so the user can fully experience the visual effect.
            setTimeout(() => {
                // Fade out the black screen
                loader.classList.add('fade-out');
                
                // Bring in the main content smoothly
                mainContent.classList.add('reveal');
                
                // Restore scrolling to the page
                document.body.style.overflow = 'auto';
            }, 3000); 
        });
    </script>
</body>
</html>
